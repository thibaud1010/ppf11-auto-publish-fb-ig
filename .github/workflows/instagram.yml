name: IG - Ejercicios (07:00 y 18:00 Paris)

# Publica UN ejercicio en las 7 cuentas de Instagram, a las 07:00 y 18:00 de Paris.
# El script elige la franja (mañana/tarde) segun la hora de Paris y es IDEMPOTENTE
# (una vez por franja y dia). Disparo exacto por reloj externo (cron-job.org);
# estos cron de GitHub son red de seguridad y no duplican.
on:
  schedule:
    - cron: "0 5 * * *"   # 07:00 Paris verano
    - cron: "0 6 * * *"   # 07:00 Paris invierno / seguridad
    - cron: "0 7 * * *"   # seguridad
    - cron: "0 8 * * *"   # seguridad
    - cron: "0 16 * * *"  # 18:00 Paris verano
    - cron: "0 17 * * *"  # 18:00 Paris invierno / seguridad
    - cron: "0 18 * * *"  # seguridad
    - cron: "0 19 * * *"  # seguridad
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar aunque ya se publicara esta franja hoy"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency: ig-state
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publicar ejercicio en todas las cuentas IG
        env:
          TOKENS_JSON: ${{ secrets.TOKENS_JSON }}
        run: python publish_instagram.py ${{ inputs.force && '--force' || '' }}
      - name: Guardar registro
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/
          git commit -m "state: ig $(date -u +%FT%TZ)" || { echo "sin cambios"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "reintento push $i"; sleep 5
          done
          echo "push fallo" >&2; exit 1
