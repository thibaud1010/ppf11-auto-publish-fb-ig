name: FB - Ejercicio gratis (18:00 Paris)

# Publica UN ejercicio en las 7 Paginas, a las 18:00 hora de Paris.
# Disparo exacto por reloj externo (cron-job.org); estos cron de GitHub son red de
# seguridad. Script idempotente (una vez por franja/dia) -> disparar varias veces no duplica.
on:
  schedule:
    - cron: "0 16 * * *"  # 18:00 Paris (verano)
    - cron: "0 17 * * *"  # 18:00 Paris (invierno) / red de seguridad
    - cron: "0 18 * * *"  # red de seguridad
    - cron: "0 19 * * *"  # red de seguridad
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar aunque ya se publicara hoy"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency: fb-state
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publicar ejercicio en todas las Paginas
        env:
          TOKENS_JSON: ${{ secrets.TOKENS_JSON }}
        run: python publish_facebook.py --type exercise ${{ inputs.force && '--force' || '' }}
      - name: Guardar registro
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/
          git commit -m "state: fb exercise $(date -u +%FT%TZ)" || { echo "sin cambios"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "reintento push $i"; sleep 5
          done
          echo "push fallo" >&2; exit 1
