name: FB - Articulo del blog (07:00 Paris)

# Publica UN articulo del blog en las 7 Paginas, a las 07:00 hora de Paris.
# El disparo EXACTO lo da un reloj externo (cron-job.org) via workflow_dispatch.
# Estos cron de GitHub son SOLO RED DE SEGURIDAD (por si el reloj externo fallara);
# como el script es IDEMPOTENTE (publica una sola vez por franja y dia), disparar
# varias veces NO duplica. Se cubre una ventana amplia por si GitHub retrasa el cron.
on:
  schedule:
    - cron: "0 5 * * *"   # 07:00 Paris (verano)
    - cron: "0 6 * * *"   # 07:00 Paris (invierno) / red de seguridad
    - cron: "0 7 * * *"   # red de seguridad si GitHub retrasa
    - cron: "0 8 * * *"   # red de seguridad
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar aunque ya se publicara hoy"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency: fb-state
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publicar articulo en todas las Paginas
        env:
          TOKENS_JSON: ${{ secrets.TOKENS_JSON }}
        run: python publish_facebook.py --type article ${{ inputs.force && '--force' || '' }}
      - name: Guardar registro
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/
          git commit -m "state: fb article $(date -u +%FT%TZ)" || { echo "sin cambios"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "reintento push $i"; sleep 5
          done
          echo "push fallo" >&2; exit 1
